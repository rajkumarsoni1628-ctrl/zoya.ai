<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoya AI - Raj's Companion</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        :root {
            --primary: #a855f7;
            --secondary: #ff4d8d;
            --bg: #0a0a0f;
            --card: #12121a;
            --text: #ffffff;
        }

        body.light-mode {
            --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
            transition: all 0.5s ease; overflow: hidden;
        }

        header {
            padding: 15px 20px; background: rgba(18, 18, 26, 0.2);
            backdrop-filter: blur(15px); display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(128,128,128,0.2);
        }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid rgba(128,128,128,0.3); border-bottom-left-radius: 2px; }

        .controls { padding: 15px; display: flex; gap: 10px; background: var(--card); border-top: 1px solid rgba(128,128,128,0.2); }
        
        textarea { flex: 1; background: transparent; border: 1px solid #444; color: var(--text); padding: 12px; border-radius: 12px; outline: none; height: 45px; }

        .btn { border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; padding: 12px 18px; }
        #sendBtn { background: linear-gradient(135deg, var(--secondary), var(--primary)); }
        #micBtn { background: #34d399; }
        
        #video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        #mood-badge { font-size: 12px; padding: 6px 12px; border-radius: 20px; background: rgba(168, 85, 247, 0.1); border: 1px solid var(--primary); }
    </style>
</head>
<body id="body">

<video id="video" autoplay muted></video>

<header>
    <div>
        <strong>ZOYA AI</strong>
        <div id="time-display" style="font-size: 10px; color: var(--primary);"></div>
    </div>
    <div id="mood-badge">Scanning Face...</div>
</header>

<div id="chat"></div>

<div class="controls">
    <button class="btn" id="micBtn" onclick="startListening()">🎤</button>
    <textarea id="userInput" placeholder="Kuch boliye, Raj..."></textarea>
    <button class="btn" id="sendBtn" onclick="handleSend()">Send</button>
    <button class="btn" onclick="clearMemory()" style="background:#444; font-size:10px;">Clear Memory</button>
</div>

<script>
    let chat = document.getElementById('chat');
    let userInput = document.getElementById('userInput');
    let moodBadge = document.getElementById('mood-badge');
    let body = document.getElementById('body');
    
    // 1. MEMORY SYSTEM (Local Storage)
    let messages = JSON.parse(localStorage.getItem('zoya_memory')) || [];
    let currentMood = "Normal 😐";
    let isMaster = false;

    // 2. TIME-AWARENESS
    function getTimeContext() {
        const hr = new Date().getHours();
        document.getElementById('time-display').innerText = new Date().toLocaleTimeString();
        if (hr < 12) return "Subah ka waqt hai (Morning)";
        if (hr < 17) return "Dopehar ka waqt hai (Afternoon)";
        return "Raat ka waqt hai (Night)";
    }

    // 3. VOICE ENGINE
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'hi-IN';

    function startListening() {
        recognition.start();
        document.getElementById('micBtn').style.background = 'red';
    }

    recognition.onresult = (event) => {
        userInput.value = event.results[0][0].transcript;
        document.getElementById('micBtn').style.background = '#34d399';
        handleSend();
    };

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'hi-IN';
        utterance.rate = 1.1; 
        window.speechSynthesis.speak(utterance);
    }

    // 4. FACE & MOOD DETECTION
    async function setupFace() {
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
        
        const video = document.getElementById('video');
        navigator.mediaDevices.getUserMedia({ video: {} }).then(s => video.srcObject = s);

        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions();
            if (detections.length > 0) {
                const expressions = detections[0].expressions;
                let max = Object.keys(expressions).reduce((a, b) => expressions[a] > expressions[b] ? a : b);
                
                if(max === 'happy') body.classList.add('light-mode');
                else body.classList.remove('light-mode');
                
                currentMood = max;
                moodBadge.innerText = "Mood: " + max.toUpperCase();
            }
        }, 3000);
    }

    // 5. CORE LOGIC
    async function handleSend() {
        let text = userInput.value.trim();
        if(!text) return;

        if(text === "Access Code: Raj-007") {
            isMaster = true;
            userInput.value = "";
            let welcome = "Identity Verified. Hello Raj! Ab humari baatein koi nahi rok sakta.";
            addMsg(welcome, "ai");
            speak(welcome);
            return;
        }

        addMsg(text, "user");
        messages.push({ role: "user", content: text });
        localStorage.setItem('zoya_memory', JSON.stringify(messages));
        userInput.value = "";

        let typing = addMsg("Zoya is writing...", "ai");

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer 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" },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [
                        { role: "system", content: `You are Zoya AI, the loyal companion of Raj. Context: ${getTimeContext()}. Raj's current mood is ${currentMood}. If isMaster is true, be sweet and call him Raj. Use memory of previous chats to be more personal. Language: Hinglish.` },
                        ...messages
                    ]
                })
            });

            const data = await response.json();
            typing.remove();
            let reply = data.choices[0].message.content;
            
            addMsg(reply, "ai", true);
            speak(reply.replace(/[#*`]/g, ''));
            messages.push({ role: "assistant", content: reply });
            localStorage.setItem('zoya_memory', JSON.stringify(messages));
        } catch (e) {
            typing.remove();
            addMsg("Connection error, Raj. Par main yahin hoon.", "ai");
        }
    }

    function addMsg(text, type, isHTML = false) {
        let div = document.createElement('div');
        div.className = `msg ${type}`;
        if(isHTML) div.innerHTML = marked.parse(text);
        else div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    function clearMemory() {
        localStorage.removeItem('zoya_memory');
        location.reload();
    }

    // Initialize with Memory
    window.onload = () => {
        setupFace();
        setInterval(getTimeContext, 1000);
        messages.forEach(m => addMsg(m.content, m.role === 'user' ? 'user' : 'ai', true));
    };
</script>

</body>
  </html>
